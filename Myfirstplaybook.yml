---
- hosts: all
  become: yes
  tasks:
    - name: Install git
      apt:
        name: git
        state: present
        update_cache: yes


    - name: Install apache2
      apt:
        name: apache2
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Restart apache2 server
      service:
        name: apache2
        state: restarted
      when: ansible_os_family == "Debian"


